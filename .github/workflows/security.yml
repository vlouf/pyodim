name: Dependency Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ "**" ]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  pip-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit
